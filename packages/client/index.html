<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeonDrift — 3D Multiplayer Racing</title>
  <meta name="description" content="Zero-install 3D multiplayer browser racing. Tap a link, race in seconds." />
  <style>
    /* Critical CSS — inlined to prevent blank flash */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-cyan: #00f5ff;
      --neon-pink: #ff00aa;
      --bg-dark: #060610;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg-dark);
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    #app {
      width: 100%; height: 100%;
      position: relative;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-dark);
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(0, 245, 255, 0.2);
      border-top-color: var(--neon-cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .loading-sub {
      margin-top: 8px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em;
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    /* ── HUD Styles ─────────────────────────────────────────────────────────── */
    #hud {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #speedometer {
      position: absolute;
      bottom: 30px;
      right: 30px;
      background: rgba(0, 0, 20, 0.7);
      border: 1px solid rgba(0, 245, 255, 0.3);
      border-radius: 8px;
      padding: 10px 18px;
      display: flex;
      align-items: baseline;
      gap: 6px;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 12px rgba(0, 245, 255, 0.15), inset 0 0 8px rgba(0, 0, 0, 0.5);
    }

    #speed-value {
      font-size: 2.4rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--neon-cyan);
      text-shadow: 0 0 10px var(--neon-cyan);
      min-width: 3ch;
      text-align: right;
    }

    #speedometer .unit {
      font-size: 0.75rem;
      color: rgba(0, 245, 255, 0.6);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #boost-bar-container {
      position: absolute;
      bottom: 90px;
      right: 30px;
      width: 120px;
      height: 8px;
      background: rgba(0, 0, 20, 0.7);
      border: 1px solid rgba(255, 0, 170, 0.3);
      border-radius: 4px;
      overflow: hidden;
      backdrop-filter: blur(4px);
    }

    #boost-bar-container::before {
      content: 'BOOST';
      position: absolute;
      top: -16px;
      left: 0;
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      color: rgba(255, 0, 170, 0.6);
    }

    #boost-bar {
      height: 100%;
      width: 0%;
      background: rgba(0, 245, 255, 0.3);
      border-radius: 4px;
      transition: width 0.1s ease, background 0.1s ease;
    }

    #respawn-msg {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--neon-pink);
      text-shadow: 0 0 16px var(--neon-pink);
      background: rgba(0, 0, 20, 0.8);
      border: 1px solid rgba(255, 0, 170, 0.4);
      border-radius: 10px;
      padding: 18px 32px;
      animation: respawn-pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes respawn-pulse {
      from { opacity: 0.7; }
      to   { opacity: 1.0; }
    }

    #lap-indicator {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      background: rgba(0, 0, 20, 0.5);
      border-radius: 6px;
      padding: 6px 16px;
    }

    #controls-hint {
      position: absolute;
      bottom: 20px;
      left: 20px;
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.3);
      line-height: 1.6;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="spinner"></div>
    <div class="loading-title">NeonDrift</div>
    <div class="loading-sub" id="loading-status">Initializing…</div>
  </div>
  <div id="app">
    <canvas id="canvas"></canvas>

    <!-- HUD overlay -->
    <div id="hud">
      <div id="speedometer">
        <span id="speed-value">0</span>
        <span class="unit">km/h</span>
      </div>

      <div id="boost-bar-container">
        <div id="boost-bar"></div>
      </div>

      <div id="respawn-msg">
        Respawning&hellip;
      </div>

      <div id="lap-indicator">Lap 1 / 3</div>

      <div id="controls-hint">
        WASD / Arrows — Drive &nbsp;|&nbsp; Space — Boost &nbsp;|&nbsp; R — Camera
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
