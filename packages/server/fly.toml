# Fly.io deployment config for NeonDrift game server.
# Deploy: fly deploy --config packages/server/fly.toml
# Regions: iad (US-East), ams (EU-West), sin (Asia), gru (Brazil)

app = "neondrift-server"
primary_region = "iad"

[build]
  dockerfile = "../../Dockerfile"

[env]
  PORT = "3001"
  NODE_ENV = "production"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 400

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "neondrift_data"
  destination = "/app/data"

# WebSocket upgrade header pass-through
[[services]]
  protocol = "tcp"
  internal_port = 3001

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 400

  [[services.tcp_checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"
